<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petrol Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Petrol Calculator</h1>
        
        <div class="calculator-form">
            <div class="input-group">
                <label for="pricePerLiter">Price per Liter (£):</label>
                <input type="number" id="pricePerLiter" value="1.72" step="0.01" min="0">
            </div>
            
            <div class="input-group">
                <label for="liters">Liters Purchased:</label>
                <input type="number" id="liters" value="0" step="0.01" min="0">
            </div>
            
            <button id="calculateBtn">Calculate Total Cost</button>
            
            <p id="result">Total Cost: £0.00</p>
        </div>
    </div>
    
    <script src="index.js"></script>
</body>
</html>
