<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RGB Colour Guessing Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>RGB Colour Guessing Game</h1>
        
        <div class="game-info">
            <p class="rgb-display">Guess the colour: <span id="rgbValue">rgb(?, ?, ?)</span></p>
            <p class="lives">Lives: <span id="livesCount">3</span></p>
            <p class="score">Score: <span id="scoreCount">0</span></p>
        </div>
        
        <div class="colour-options" id="colourOptions">
            <!-- Colour buttons will be generated by JavaScript -->
        </div>
        
        <div class="message" id="message"></div>
        
        <button id="restartBtn" class="hidden">Play Again</button>
    </div>
    
    <script src="index.js"></script>
</body>
</html>
