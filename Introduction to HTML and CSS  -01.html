<!DOCTYPE html>
<html>
    <body>
        <!-- العنوان الرئيسي للصفحة -->
        <header>
            <!-- قسم الصورة والوصف مع خلفية ملونة -->
            <div style="background-color: rgb(255, 173, 122); padding: 30px; text-align: center;">
                <!-- صورة الوصفة مع إطار -->
                <img src="https://pic.i7lm.com/wp-content/uploads/2019/05/0b87c96ab61a232f8da9c646fb6753068875c2ef-1.jpg" 
                     width="400" height="200" 
                     style="border-radius: 15px; border: 3px solid white;"
                     alt="Burger Image">
                <!-- h1 لاسم الوصفة -->
                <h1 style="color: white; margin: 15px 0; font-size: 2.5em;">🍔 Burger</h1>
                <!-- p لوصف الوصفة -->
                <p style="color: white; font-size: 1.2em;">The meal is suitable for dinner time 🍽️</p>
            </div>
            
            <!-- قسم المكونات مع خلفية بيضاء -->
            <article style="background-color: white; padding: 20px; margin: 20px; border-radius: 10px;">
                <!-- h2 للمكونات -->
                <h2 style="color: darkorange; border-bottom: 2px solid orange; padding-bottom: 10px;">🥗 Ingredients</h2>
                <!-- قائمة غير مرتبة للمكونات -->
                <ul style="list-style-type: square; color: darkgreen;">
                    <li style="padding: 8px;">A slice of ham</li>
                    <li style="padding: 8px;">Bread</li>
                    <li style="padding: 8px;">Lettuce</li>
                    <li style="padding: 8px;">Tomato</li>
                    <li style="padding: 8px;">Your favorite additions</li>
                </ul>
            </article>
            
            <!-- قسم الطريقة مع خلفية بيضاء -->
            <article style="background-color: white; padding: 20px; margin: 20px; border-radius: 10px;">
                <!-- h2 للطريقة -->
                <h2 style="color: darkorange; border-bottom: 2px solid orange; padding-bottom: 10px;">👨‍🍳 Method</h2>
                <!-- قائمة مرتبة للخطوات -->
                <ol style="color: darkblue;">
                    <li style="padding: 8px;"><b>Step 1:</b> Preparing bread and meat</li>
                    <li style="padding: 8px;"><b>Step 2:</b> Adding fresh vegetables</li>
                    <li style="padding: 8px;"><b>Step 3:</b> Adding favorite sauces</li>
                    <li style="padding: 8px;"><b>Step 4:</b> Serving the meal</li>
                </ol>
            </article>
        </header>
    </body>
</html>
