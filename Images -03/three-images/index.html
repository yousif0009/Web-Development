<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Three Images - Nature Collection</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Nature Collection</h1>
    <p class="subtitle">Beautiful landscapes from around the world</p>
  </header>

  <main class="gallery">
    <article class="image-card">
      <img 
        src="pexels-patuur-35298250.jpg" 
        alt="Snow-capped mountain peak at sunrise with dramatic clouds" 
        width="400" 
        height="267"
        title="Mountain Sunrise - Unsplash"
        class="filtered">
      <div class="image-info">
        <p class="license">Photo by <strong>Adam Kool</strong> on Unsplash</p>
        <p class="license-type">License: <a href="https://unsplash.com/license" target="_blank" rel="noopener">Unsplash Free License</a></p>
      </div>
    </article>

    <article class="image-card">
      <img 
        src="pexels-eslames1-36099595.jpg" 
        alt="Misty forest with tall pine trees and morning fog" 
        width="400" 
        height="267"
        title="Misty Forest - Pexels"
        class="filtered">
      <div class="image-info">
        <p class="license">Photo by <strong>Pixabay</strong> on Pexels</p>
        <p class="license-type">License: <a href="https://www.pexels.com/license/" target="_blank" rel="noopener">Pexels Free License</a></p>
      </div>
    </article>

    <article class="image-card">
      <img 
        src="pexels-orhan-namli-2158307973-35567683.jpg" 
        alt="Turquoise ocean waves crashing on sandy beach" 
        width="400" 
        height="267"
        title="Ocean Waves - Pexels"
        class="filtered">
      <div class="image-info">
        <p class="license">Photo by <strong>Pixabay</strong> on Pexels</p>
        <p class="license-type">License: <a href="https://www.pexels.com/license/" target="_blank" rel="noopener">Pexels Free License</a></p>
      </div>
    </article>
  </main>
</body>
</html>
