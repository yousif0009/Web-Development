<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Planner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header -->
    <header>
        <h1>Study Planner</h1>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Modules</a></li>
                <li><a href="#">Schedule</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>
    <!-- Main Content -->
    <main>
        <section class="wireframe">
            <!-- ضع صورة wireframe هنا إذا توفرت -->
            <img src="wireframe.jpg" alt="Wireframe" class="wireframe-img">
        </section>
        <section class="planner-content">
            <div class="column">
                <h2>Today's Tasks</h2>
                <ul>
                    <li>Read HTML & CSS chapter</li>
                    <li>Practice Flexbox layout</li>
                </ul>
                <button>Add Task</button>
            </div>
            <div class="column">
                <h2>Upcoming Deadlines</h2>
                <ul>
                    <li>Assignment 1 - 28 April</li>
                    <li>Quiz - 30 April</li>
                </ul>
            </div>
            <div class="column">
                <h2>Notes</h2>
                <ul>
                    <li>Review JavaScript basics</li>
                    <li>Check course forum</li>
                </ul>
            </div>
        </section>
    </main>
    <!-- Footer -->
    <footer>
        &copy; 2026 Study Planner App
    </footer>
</body>
</html>
